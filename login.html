<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #6ee7b7;
    --accent2: #818cf8;
    --text: #e2e8f0;
    --muted: #64748b;
    --error: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .bg-grid {
    position: fixed; inset: 0; pointer-events: none;
    background-image: linear-gradient(rgba(110,231,183,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(110,231,183,.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .glow {
    position: fixed; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(110,231,183,.08) 0%, transparent 70%);
    top: -200px; left: -200px; pointer-events: none;
  }
  .glow2 {
    position: fixed; width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(129,140,248,.07) 0%, transparent 70%);
    bottom: -100px; right: -100px; pointer-events: none;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px;
    width: 420px;
    position: relative;
    animation: fadeUp .5s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 36px;
  }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; font-size: 14px; color: #0a0a0f; font-weight: 500;
  }
  .logo-text {
    font-family: 'DM Mono', monospace; letter-spacing: .15em;
    font-size: 15px; color: var(--text); font-weight: 500;
  }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
  .field { margin-bottom: 20px; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 8px; letter-spacing: .06em; text-transform: uppercase; }
  input {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 16px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; transition: border-color .2s, box-shadow .2s; outline: none;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(110,231,183,.1); }
  .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .remember { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); cursor: pointer; }
  .remember input[type=checkbox] { width: auto; accent-color: var(--accent); }
  .forgot { font-size: 13px; color: var(--accent); text-decoration: none; }
  .btn {
    width: 100%; padding: 13px; border-radius: 8px;
    background: var(--accent); color: #0a0a0f;
    border: none; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: opacity .2s, transform .1s;
    letter-spacing: .03em;
  }
  .btn:hover { opacity: .9; }
  .btn:active { transform: scale(.99); }
  .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .divider span { font-size: 12px; color: var(--muted); }
  .version { position: absolute; bottom: -32px; left: 0; right: 0; text-align: center; font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>
<div class="glow2"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">NX</div>
    <span class="logo-text">NEXUS</span>
  </div>
  <h1>Connexion</h1>
  <p class="subtitle">Accédez à votre espace administration.</p>
  <div class="field">
    <label>Adresse e-mail</label>
    <input type="email" placeholder="admin@nexus.io" value="admin@nexus.io">
  </div>
  <div class="field">
    <label>Mot de passe</label>
    <input type="password" placeholder="••••••••" value="password">
  </div>
  <div class="row">
    <label class="remember"><input type="checkbox" checked> Se souvenir de moi</label>
    <a href="#" class="forgot">Mot de passe oublié ?</a>
  </div>
  <button class="btn" onclick="window.location='dashboard.html'">Se connecter →</button>
  <div class="version">v2.4.1 · NEXUS Admin</div>
</div>
</body>
</html>
